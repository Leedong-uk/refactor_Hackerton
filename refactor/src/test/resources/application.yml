
  jpa:
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  datasource:
    url: jdbc:h2:tcp://localhost/~/hackerton
    username: sa
    password:
    driver-class-name: org.h2.Driver

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace