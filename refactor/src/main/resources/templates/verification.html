<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>경상났네 · 이메일 인증</title>
</head>
<body style="margin:0; padding:0; font-family:Arial,'Noto Sans KR',sans-serif; background:#FAF9F6; color:#222;">
<div style="max-width:600px; margin:40px auto; background:#fff; border-radius:12px;
            box-shadow:0 8px 24px rgba(0,0,0,.15);
            padding:32px; text-align:center;">

  <img src="https://zibitz.shop/images/logo.png" alt="경상났네 로고" width="80" style="display:block; margin:0 auto 20px;">
  <!-- 제목 -->
  <h2 style="margin:0 0 16px; font-size:22px; color:#000;">📧 이메일 인증번호 안내</h2>

  <!-- 안내 문구 -->
  <p style="font-size:15px; line-height:1.6; color:#444; margin:8px 0;">
    안녕하세요. <b>경상났네</b>를 이용해주셔서 감사합니다.<br>
    요청하신 인증번호를 아래 발급해 드렸습니다.
  </p>

  <!-- ✅ 인증번호 박스 -->
  <div style="display:inline-block; background:#DA4C24; color:#fff; font-size:22px; font-weight:bold;
                letter-spacing:4px; padding:14px 30px; border-radius:8px; margin:20px 0;
                box-shadow:0 4px 10px rgba(0,0,0,.2);">
    [[${code}]]
  </div>

  <!-- 유효 시간 안내 -->
  <p style="font-size:14px; color:#666; margin-top:20px;">
    인증번호는 <b style="color:#DA4C24;">5분간만 유효</b>합니다.
  </p>

  <!-- 푸터 -->
  <p style="font-size:12px; color:#999; margin-top:30px; border-top:1px solid #eee; padding-top:12px;">
    본 메일은 발신 전용입니다. 잘못 수신하셨다면 무시해 주세요.<br>
    ⓒ 경상났네 Team
  </p>
</div>
</body>
</html>
