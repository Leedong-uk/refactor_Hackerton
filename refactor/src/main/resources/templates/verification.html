<!doctype html>

<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>경상났네 · 이메일 인증</title>
</head>

<body style="
margin:0;
padding:0;
background:linear-gradient(135deg,#FFF4F1,#FFEAE3);
font-family:Arial,'Noto Sans KR',sans-serif;
">

<div style="
max-width:600px;
margin:60px auto;
background:#ffffff;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.12);
padding:40px;
text-align:center;
position:relative;
overflow:hidden;
">

  <!-- 상단 컬러 바 -->

  <div style="
position:absolute;
top:0;
left:0;
right:0;
height:6px;
background:linear-gradient(90deg,#DA4C24,#FF8A5B,#DA4C24);
"></div>

  <!-- 로고 -->

  <img src="images/default.png"
       width="90"
       style="
  margin-bottom:24px;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,0.15));
  ">

  <!-- 제목 -->

  <h2 style="
margin:0 0 14px;
font-size:26px;
font-weight:800;
color:#111;
letter-spacing:-0.5px;
">
    📧 이메일 인증번호 안내
  </h2>

  <!-- 설명 -->

  <p style="
font-size:15px;
color:#555;
line-height:1.8;
margin-bottom:28px;
">
    안녕하세요 😊 <b style="color:#DA4C24;">경상났네</b>를 이용해주셔서 감사합니다.<br>
    아래 인증번호를 입력하여 인증을 완료해주세요.
  </p>

  <!-- 인증번호 카드 -->

  <div style="
display:inline-block;
background:linear-gradient(135deg,#DA4C24,#FF7A45);
color:white;
font-size:30px;
font-weight:900;
letter-spacing:8px;
padding:20px 44px;
border-radius:14px;
box-shadow:
0 10px 30px rgba(218,76,36,0.45),
inset 0 -4px 8px rgba(0,0,0,0.15);
margin-bottom:30px;
">

    [[${code}]]

  </div>

  <!-- 유효시간 -->

  <div style="
font-size:14px;
background:#FFF1EC;
display:inline-block;
padding:10px 18px;
border-radius:30px;
color:#DA4C24;
font-weight:600;
margin-bottom:26px;
">
    ⏱ 인증번호는 5분간 유효합니다
  </div>

  <!-- 구분선 -->

  <div style="
height:1px;
background:linear-gradient(90deg,transparent,#eee,transparent);
margin:28px 0;
"></div>

  <!-- 푸터 -->

  <p style="
font-size:12px;
color:#999;
line-height:1.7;
margin:0;
">
    본 메일은 발신 전용 메일입니다.<br>
    잘못 수신하셨다면 무시해주세요.<br><br>
    ⓒ 2026 경상났네 Team
  </p>

</div>

</body>
</html>
